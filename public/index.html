<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MR Review Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="hicon">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div>
      <div class="htitle">MR Review Assistant</div>
      <div class="hsub">AI-powered code review · GitLab &amp; GitHub · Backend / Frontend / Fullstack</div>
    </div>
    <div class="hbadge">v1.1</div>
  </div>

  <!-- Step 1: Input mode -->
  <div class="card">
    <div class="card-title">Step 1 — Code to review</div>
    <div class="tabs">
      <div class="tab active" data-tab="gitlab">GitLab MR URL</div>
      <div class="tab" data-tab="github">GitHub PR URL</div>
      <div class="tab" data-tab="paste">Paste diff / code</div>
    </div>

    <!-- GitLab tab -->
    <div class="tab-pane active" id="tab-gitlab">
      <div class="input-row">
        <input type="text" id="mr-url" placeholder="https://gitlab.com/group/project/-/merge_requests/42" oninput="resetMR()" />
        <button class="btn" id="fetch-btn" onclick="fetchMR()">Fetch MR</button>
      </div>
    </div>

    <!-- GitHub tab -->
    <div class="tab-pane" id="tab-github">
      <div class="input-row">
        <input type="text" id="gh-pr-url" placeholder="https://github.com/owner/repo/pull/42" oninput="resetMR()" />
        <button class="btn" id="gh-fetch-btn" onclick="fetchGitHubPR()">Fetch PR</button>
      </div>
    </div>

    <!-- Paste tab -->
    <div class="tab-pane" id="tab-paste">
      <div class="field">
        <label for="manual-title">MR / PR title (optional)</label>
        <input type="text" id="manual-title" placeholder="feat: add user authentication" />
      </div>
      <div class="field">
        <label for="diff-input">Paste git diff or file contents</label>
        <textarea id="diff-input" placeholder="Paste your git diff, changed file(s), or specific code snippets here..."></textarea>
      </div>
    </div>

    <!-- Shared status + preview -->
    <div id="mr-status" class="status-row hidden">
      <div class="dot" id="status-dot"></div>
      <span id="status-txt"></span>
    </div>
    <div id="mr-preview" class="hidden"></div>
  </div>

  <!-- Step 2: Focus areas -->
  <div class="card">
    <div class="card-title">Step 2 — Focus areas</div>
    <div class="field">
      <label>Stack / project type</label>
      <div class="seg-ctrl" id="stack-ctrl">
        <button class="seg active" data-stack="backend" onclick="setStack('backend')">Backend</button>
        <button class="seg" data-stack="frontend" onclick="setStack('frontend')">Frontend</button>
        <button class="seg" data-stack="fullstack" onclick="setStack('fullstack')">Fullstack</button>
      </div>
    </div>
    <div class="chips" id="chips"></div>
    <div class="field">
      <label for="eslint-config">Custom ESLint rules (optional — paste your rules object)</label>
      <textarea id="eslint-config" style="min-height:80px" placeholder='{
  "@typescript-eslint/no-unused-vars": ["error", { "argsIgnorePattern": "^_" }],
  "@typescript-eslint/no-explicit-any": "error",
  "@typescript-eslint/no-non-null-assertion": "warn"
}'></textarea>
    </div>
    <div class="field">
      <label for="llm-select">AI model</label>
      <select id="llm-select"><option value="">Loading models...</option></select>
    </div>
    <button class="btn btn-primary btn-full" id="review-btn" onclick="runReview()">Analyze &amp; Review ↗</button>
  </div>

  <!-- Output -->
  <div id="output"></div>

</div>

<script src="app.js"></script>
</body>
</html>
